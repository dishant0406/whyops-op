[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "whyops"
version = "0.1.0"
description = "WhyOps SDK — AI agent observability"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["whyops", "observability", "ai", "agents", "llm", "tracing"]
dependencies = [
    "httpx>=0.27",
    "typing_extensions>=4.0",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.8",
    "ruff>=0.4",
    "pytest>=8",
    "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["whyops"]

[tool.mypy]
strict = true
python_version = "3.9"

[tool.ruff]
line-length = 100
target-version = "py39"
